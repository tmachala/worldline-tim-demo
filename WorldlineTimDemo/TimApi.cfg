# TIM API configuration for the WorldLine TIM .NET demo.
# The global section is loaded automatically by `new TerminalSettings()`.
[global]

# Logging directory. A file {LogDir}/TimApi_YYYYMMDD.log is created here.
LogDir = .

# Log levels: OFF, SEVERE, WARNING, INFO, FINE, FINER, FINEST
LogTerminal = FINE
LogBackend = INFO
LogStateMachine = FINE
LogComm = FINER

# Connection mode: Broadcast, OnFixIP, Serial.
# We talk to a known test terminal over TCP/IP, so use a fixed IP.
ConnectionMode = OnFixIP
ConnectionIPString = 192.168.0.21
ConnectionIPPort = 7784

# Terminal identifier. Mainly relevant for broadcast discovery; kept here as a
# placeholder. Adjust to the real terminal id if the SDK requires a match.
TerminalId = 25697806

# Protocol type for TCP/IP transport.
ProtocolType = SIXMLTCP

# Pre/Post automatism. AutoCommit Off -> the app calls Commit() explicitly.
FetchBrands = On
AutoCommit = Off
